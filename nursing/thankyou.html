<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thankyou</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css" />
    <!-- Google Tag Manager -->
    <script>
        (function (w, d, s, l, i) {
            w[l] = w[l] || [];
            w[l].push({ 'gtm.start': new Date().getTime(), event: 'gtm.js' });
            var f = d.getElementsByTagName(s)[0],
                j = d.createElement(s),
                dl = l != 'dataLayer' ? '&l=' + l : '';
            j.async = true;
            j.src = 'https://www.googletagmanager.com/gtm.js?id=' + i + dl;
            f.parentNode.insertBefore(j, f);
        })(window, document, 'script', 'dataLayer', 'GTM-KCVNG33V');
    </script>
    <!-- End Google Tag Manager -->
    <style>
        .thankyou-section {
            min-height: 100vh;
            background: #F9F7F5;
            padding: 60px 15px;
        }

        .thankyou-card {
            max-width: 700px;
            border: 1px solid #e5e0dc;
            border-radius: 20px;
            background: #fdfcfc;
            padding: 30px;
            --tw-shadow: 0 1px 2px 0 rgb(0 0 0 / .05);
            --tw-shadow-colored: 0 1px 2px 0 var(--tw-shadow-color);
            box-shadow: var(--tw-ring-offset-shadow, 0 0 #0000), var(--tw-ring-shadow, 0 0 #0000), var(--tw-shadow);
        }

        .icon-box {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: #EFE5E7;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .icon-box i {
            color: #7a1f2e;
            font-size: 24px;
        }

        .thankyou-title {
            font-family: Playfair Display, Georgia, serif;
            font-size: 32px;
            font-weight: 700;
            color: #111827;
        }

        .thankyou-text {
            font-family: Inter, system-ui, sans-serif;
            margin-top: 10px;
            color: #7e6f67;
            line-height: 1.6;
        }

        .action-btn {
            padding: 10px 20px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 600;
            transition: 0.3s;
            background-color: #f9f7f5;
            border: 1px solid #f9f7f5;
            color: #2c2421;
        }

        .whatsapp-btn {
            background: #16a34a;
            color: #fff;
        }

        .whatsapp-btn:hover {
            background: #15803d;
            color: #fff;
        }

        .links-wrap {
            margin-top: 20px;
        }

        .home-link {
            color: #7a1f2e;
            font-weight: 600;
            text-decoration: none;
        }

        .home-link:hover {
            text-decoration: underline;
        }

        .secondary-link {
            color: #111827;
            font-weight: 600;
            text-decoration: none;
        }

        .secondary-link:hover {
            color: #7a1f2e;
        }

        @media (max-width:768px) {
            .thankyou-card {
                padding: 20px;
            }

            .thankyou-title {
                font-size: 28px;
            }

            .home-link,
            .secondary-link {
                font-size: 14px;
            }
        }
    </style>
</head>

<body>
    <section class="thankyou-section d-flex align-items-start">
        <!-- Google Tag Manager (noscript) -->
        <noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-KCVNG33V" height="0" width="0"
                style="display: none; visibility: hidden"></iframe></noscript>
        <!-- End Google Tag Manager (noscript) -->
        <div class="container">
            <div class="thankyou-card mx-auto d-flex flex-column gap-3">

                <div class="d-flex flex-column sm:flex-row align-items-start gap-3">
                    <div class="icon-box">
                        <i class="fa-regular fa-circle-check"></i>
                    </div>

                    <div class="flex-grow-1">
                        <h1 class="thankyou-title">Thank you!</h1>
                        <p class="thankyou-text">
                            We’ve received your request. Our counselor will reach out soon
                            with course details and the next steps.
                        </p>
                    </div>
                </div>

                <div class="row g-3">
                    <div class="col-md-6">
                        <a href="tel:+917055547000"
                            class="btn btn-light border w-100 action-btn d-flex align-items-center justify-content-center gap-2">
                            <i class="fa-solid fa-phone"></i>
                            Call now
                        </a>
                    </div>

                    <div class="col-md-6">
                        <a href="https://wa.me/917055547000?text=Hi!%20I%27m%20following%20up%20on%20my%20callback%20request."
                            target="_blank"
                            class="btn whatsapp-btn w-100 action-btn d-flex align-items-center justify-content-center gap-2">
                            <i class="fa-regular fa-comment"></i>
                            WhatsApp
                        </a>
                    </div>
                </div>

                <div class="links-wrap d-flex align-items-center gap-3 flex-wrap">
                    <a href="/" class="home-link">Back to home</a>
                    <span class="text-muted">•</span>
                    <a href="/#contact" class="secondary-link">Submit another request</a>
                </div>

            </div>
        </div>
    </section>
</body>


</html>
